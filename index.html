<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения, Нуршерик!</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b1055);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 3em;
    margin-top: 50px;
    animation: fadeIn 2s ease-in-out;
}

.message {
    font-size: 1.3em;
    max-width: 600px;
    margin: 20px auto;
    opacity: 0;
    animation: fadeIn 3s ease-in-out forwards;
    animation-delay: 1s;
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 1em;
    background: #ff4b5c;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #ff1e40;
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Нуршерик, туулган күнүң менен!</h1>
    <div class="message">
        Бүгүн сенин күнүң! Жашооң ийгиликтерге, акчага, бакытка толсун.
        Ар бир максатыңа жетип, күчтүү бойдон кал! 💪🔥
    </div>
    <button onclick="showSurprise()">Сюрприз бас!</button>
</div>

<script>
function showSurprise() {
    alert("🎉 Нуршерик, сен легендасың! Жаңы жашың ийгиликтүү болсун! 🎉");
    launchConfetti();
}

function launchConfetti() {
    for (let i = 0; i < 50; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        document.body.appendChild(confetti);

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = randomColor();
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

        setTimeout(() => {
            confetti.remove();
        }, 5000);
    }
}

function randomColor() {
    const colors = ["#ff4b5c", "#ffde59", "#00f5d4", "#9b5de5", "#f15bb5"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
